bundle:
  name: genie-observability-hub

# ─── CUSTOMER MUST SET THESE ───
# Deploy with: databricks bundle deploy -t dev \
#   --var catalog=my_catalog \
#   --var warehouse_id=abc123def456
variables:
  catalog:
    description: "Target Unity Catalog for observability tables (REQUIRED)"
  schema:
    description: "Target schema within the catalog"
    default: genie_observability
  warehouse_id:
    description: "SQL warehouse ID for scheduled jobs (REQUIRED)"
  harvest_lookback_days:
    description: "Days to look back on first harvest run"
    default: "30"

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}

resources:
  jobs:
    # ─── Manual: First-time setup wizard (run this FIRST) ───
    setup_wizard:
      name: "[${bundle.target}] Genie Observability — Setup Wizard"
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: src/00_setup_wizard
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - databricks-sdk>=0.40.0
      tags:
        project: genie-observability-hub

    # ─── Run once: creates schema + Delta tables ───
    bootstrap:
      name: "[${bundle.target}] Genie Observability — Bootstrap"
      tasks:
        - task_key: create_schema_and_tables
          notebook_task:
            notebook_path: src/01_bootstrap
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
            warehouse_id: ${var.warehouse_id}
      tags:
        project: genie-observability-hub

    # ─── Daily: full pipeline orchestrator (harvest + AI + cost + alerts) ───
    orchestrator:
      name: "[${bundle.target}] Genie Observability — Daily Pipeline"
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: UTC
      max_concurrent_runs: 1
      tasks:
        - task_key: run_pipeline
          notebook_task:
            notebook_path: src/00_config
            base_parameters:
              target_catalog: ${var.catalog}
              target_schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
              lookback_days: ${var.harvest_lookback_days}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - databricks-sdk>=0.40.0

      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}
      tags:
        project: genie-observability-hub

    # ─── Manual: MLflow tracing demo ───
    tracing_demo:
      name: "[${bundle.target}] Genie Observability — Tracing Demo"
      tasks:
        - task_key: run_traced_conversation
          notebook_task:
            notebook_path: src/05_tracing_example
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - databricks-sdk>=0.40.0
              - mlflow>=2.18.0
      tags:
        project: genie-observability-hub


targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${workspace.host}

  prod:
    mode: production
    workspace:
      host: ${workspace.host}
    run_as:
      user_name: ${workspace.current_user.userName}
